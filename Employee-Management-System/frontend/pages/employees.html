<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees | Employee Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="d-flex">
    <nav class="sidebar p-3">
      <a href="dashboard.html" class="brand text-decoration-none">
        <img src="../assets/logo.svg" alt="Acme HR Logo" class="sidebar-logo" />
        <span class="brand-text">Acme HR Portal</span>
      </a>
      <ul class="nav nav-pills flex-column mb-3">
        <li class="nav-item mb-1"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item mb-1"><a href="employees.html" class="nav-link active">Employee List</a></li>
        <li class="nav-item mb-1"><a href="addEmployee.html" class="nav-link">Add Employee</a></li>
      </ul>
      <button id="logoutBtn" class="btn btn-outline-light w-100 mt-auto">Logout</button>
    </nav>

    <div class="flex-grow-1">
      <nav class="navbar navbar-expand-lg navbar-custom px-4 py-3 shadow-sm">
        <div class="container-fluid">
          <div class="d-flex align-items-center gap-3">
            <span class="navbar-brand mb-0 h1">Employee List</span>
            <span class="badge bg-soft-blue text-primary">Manage records</span>
          </div>
          <div class="text-end">
            <span id="adminName" class="fw-semibold"></span>
          </div>
        </div>
      </nav>

      <main class="p-4">
        <div class="d-flex flex-column flex-md-row gap-3 mb-4 justify-content-between align-items-center">
          <div class="input-group w-100 w-md-50">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input id="searchInput" type="text" class="form-control" placeholder="Search by name, ID, or department" />
          </div>
          <button id="addEmployeeBtn" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add Employee</button>
        </div>

        <div class="table-responsive shadow-sm bg-white rounded">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-secondary">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/employee.js"></script>
</body>
</html>
