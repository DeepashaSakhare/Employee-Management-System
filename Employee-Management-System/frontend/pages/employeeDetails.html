<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Details | Employee Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="d-flex">
    <nav class="sidebar p-3">
      <a href="dashboard.html" class="brand text-decoration-none">
        <img src="../assets/logo.svg" alt="Acme HR Logo" class="sidebar-logo" />
        <span class="brand-text">Acme HR Portal</span>
      </a>
      <ul class="nav nav-pills flex-column mb-3">
        <li class="nav-item mb-1"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item mb-1"><a href="employees.html" class="nav-link">Employee List</a></li>
