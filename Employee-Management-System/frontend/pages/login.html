<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Employee Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="login-page d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="card shadow-sm login-card">
      <div class="card-body">
        <div class="login-brand">
          <img src="../assets/logo.svg" alt="Acme HR Logo" class="login-logo" />
          <div>
            <h1>Acme HR Suite</h1>
            <p class="text-white small mb-0">Secure employee management portal</p>
          </div>
        </div>
        <h2 class="card-title text-center mb-4 text-dark">Admin Login</h2>
        <form id="login-form" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="admin@example.com" required />
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Password" required />
            <div class="invalid-feedback">Please enter your password.</div>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div class="mt-3 text-center text-muted">
          <small>Use the test admin credentials below.</small>
        </div>
        <div class="mt-2 text-center text-muted small">
          <p class="mb-1">Test admin:</p>
          <p class="mb-0">Email: <strong>admin@example.com</strong></p>
          <p class="mb-0">Password: <strong>StrongPassword123</strong></p>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
